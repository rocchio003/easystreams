<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{manifestName}} - Stremio Addon</title>
        <style>
            :root {
                --purple: #8A5AAB;
                --purple-hover: #7b4b9b;
                --bg: #151515;
                --text: #fff;
                --text-secondary: #aaa;
            }
            body {
                background-color: var(--bg);
                color: var(--text);
                font-family: 'Open Sans', Arial, sans-serif;
                margin: 0;
                padding: 0;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                background-image: radial-gradient(circle at center, #252525 0%, #151515 100%);
            }
            .header {
                padding: 20px 40px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .logo-text {
                font-weight: 700;
                font-size: 20px;
                color: #fff;
                text-decoration: none;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .logo-icon {
                width: 32px;
                height: 32px;
                background: var(--purple);
                border-radius: 6px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
            }
            .main-content {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
                text-align: center;
                position: relative;
                z-index: 1;
            }
            .addon-card {
                background: #1e1e1e;
                border-radius: 12px;
                padding: 50px 40px;
                max-width: 500px;
                width: 100%;
                box-shadow: 0 10px 40px rgba(0,0,0,0.4);
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .addon-logo {
                width: 120px;
                height: 120px;
                background: #252525;
                border-radius: 16px;
                margin-bottom: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 50px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            }
            h1 {
                margin: 0 0 10px 0;
                font-size: 32px;
                font-weight: 700;
            }
            .version {
                color: var(--text-secondary);
                font-size: 14px;
                margin-bottom: 20px;
                background: #2a2a2a;
                padding: 4px 10px;
                border-radius: 4px;
            }
            .description {
                color: var(--text-secondary);
                font-size: 16px;
                line-height: 1.6;
                margin-bottom: 20px;
                max-width: 400px;
            }
            .providers-title {
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #666;
                margin-bottom: 10px;
                margin-top: 10px;
            }
            .providers-list {
                margin-bottom: 30px;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px;
            }
            .provider-tag {
                background: #2a2a2a;
                padding: 5px 10px;
                border-radius: 6px;
                font-size: 11px;
                color: #ccc;
                border: 1px solid #333;
                text-transform: uppercase;
                font-weight: 600;
                letter-spacing: 0.5px;
            }
            .config-panel {
                width: 100%;
                margin-bottom: 24px;
                padding: 16px 18px;
                border-radius: 10px;
                border: 1px solid #333;
                background: #232323;
                text-align: left;
                box-sizing: border-box;
            }
            .config-panel-title {
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #8f8f8f;
                margin-bottom: 12px;
            }
            .config-toggle {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                cursor: pointer;
                color: #f2f2f2;
            }
            .config-panel .config-toggle + .config-toggle {
                margin-top: 14px;
            }
            .config-toggle input {
                margin-top: 2px;
            }
            .config-toggle strong {
                display: block;
                font-size: 14px;
                margin-bottom: 4px;
            }
            .config-toggle span {
                display: block;
                color: var(--text-secondary);
                font-size: 13px;
                line-height: 1.4;
            }
            .config-input {
                width: 100%;
                margin-top: 10px;
                padding: 10px 12px;
                border-radius: 8px;
                border: 1px solid #3a3a3a;
                background: #171717;
                color: #f2f2f2;
                font-size: 14px;
                box-sizing: border-box;
            }
            .config-input::placeholder {
                color: #7a7a7a;
            }
            .easy-proxy-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin-top: 10px;
            }
            .easy-proxy-row {
                display: grid;
                grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr) auto;
                gap: 8px;
                align-items: end;
            }
            .easy-proxy-row .config-input {
                margin-top: 0;
            }
            .easy-proxy-remove,
            .easy-proxy-add {
                border-radius: 8px;
                border: 1px solid #3a3a3a;
                background: #171717;
                color: #f2f2f2;
                font-size: 13px;
                font-weight: 700;
                cursor: pointer;
            }
            .easy-proxy-remove {
                width: 40px;
                height: 40px;
            }
            .easy-proxy-add {
                width: 100%;
                margin-top: 12px;
                padding: 10px 12px;
            }
            .easy-proxy-remove:hover,
            .easy-proxy-add:hover {
                border-color: #555;
            }
            @media (max-width: 560px) {
                .easy-proxy-row {
                    grid-template-columns: 1fr;
                }
                .easy-proxy-remove {
                    width: 100%;
                }
            }
            .settings-btn {
                width: 100%;
                margin-bottom: 14px;
                padding: 12px 14px;
                border-radius: 8px;
                border: 1px solid #3a3a3a;
                background: #171717;
                color: #f2f2f2;
                font-size: 14px;
                font-weight: 700;
                cursor: pointer;
                text-align: left;
            }
            .settings-btn:hover {
                border-color: #555;
            }
            .settings-panel {
                display: none;
            }
            .settings-panel.open {
                display: block;
            }
            .provider-options {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
            }
            .provider-option {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 9px 10px;
                border: 1px solid #333;
                border-radius: 8px;
                background: #191919;
                color: #ddd;
                font-size: 12px;
                font-weight: 700;
                text-transform: uppercase;
                cursor: pointer;
            }
            .provider-option input {
                margin: 0;
            }
            .install-btn {
                background-color: var(--purple);
                color: white;
                border: none;
                padding: 16px 40px;
                font-size: 18px;
                font-weight: 700;
                border-radius: 8px;
                cursor: pointer;
                text-decoration: none;
                transition: transform 0.2s, background-color 0.2s;
                display: inline-block;
                box-shadow: 0 4px 15px rgba(138, 90, 171, 0.4);
            }
            .install-btn:hover {
                background-color: var(--purple-hover);
                transform: translateY(-2px);
            }
            .install-btn:active {
                transform: translateY(0);
            }
            .copy-btn {
                background-color: transparent;
                color: var(--text-secondary);
                border: 1px solid #333;
                padding: 10px 20px;
                font-size: 14px;
                font-weight: 600;
                border-radius: 6px;
                cursor: pointer;
                margin-top: 15px;
                transition: all 0.2s;
            }
            .copy-btn:hover {
                border-color: #555;
                color: #fff;
            }
            .footer {
                padding: 20px;
                text-align: center;
                color: #555;
                font-size: 13px;
            }
            .footer a {
                color: #777;
                text-decoration: none;
            }
            .footer a:hover {
                color: var(--purple);
            }
            
            /* Background Pattern */
            .bg-pattern {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23222" fill-opacity="0.4"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
                opacity: 0.5;
                z-index: 0;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div class="main-content">
            <div class="addon-card">
                <div class="addon-logo">
                    📺
                </div>
                <h1>{{manifestName}}</h1>
                <div class="version">Version {{manifestVersion}}</div>
                <p class="description">
                    {{manifestDescription}}
                </p>
                
                <div class="providers-title">Active Providers</div>
                <div class="providers-list">
                    {{providersHtml}}
                </div>

                <div class="config-panel">
                    <div class="config-panel-title">EasyProxy</div>
                    <div class="config-toggle">
                        <div style="width: 100%;">
                            <strong>EasyProxy endpoints</strong>
                            <div id="easyProxyList" class="easy-proxy-list"></div>
                            <button id="addEasyProxy" type="button" class="easy-proxy-add">Add EasyProxy</button>
                        </div>
                    </div>
                    <label class="config-toggle" for="easyProxyMode">
                        <div style="width: 100%;">
                            <strong>EasyProxy Mode</strong>
                            <span>Failover: usa sempre il primo proxy della lista, passa al successivo solo se il primo è offline. Load-balance: alterna i proxy a ogni richiesta per distribuire il carico.</span>
                            <select class="config-input" id="easyProxyMode" name="easyProxyMode">
                                <option value="failover">Failover</option>
                                <option value="load-balance">Load balance</option>
                            </select>
                        </div>
                    </label>
                </div>

                <div class="config-panel">
                    <div class="config-panel-title">Catalogs</div>
                    <label class="config-toggle" for="easyCatalogsLangIt">
                        <input type="checkbox" id="easyCatalogsLangIt" name="easyCatalogsLangIt">
                        <div>
                            <strong>EasyCatalogs mode</strong>
                            <span>Adds Italian language mapping hints for EasyCatalogs installs.</span>
                        </div>
                    </label>
                </div>

                <div class="config-panel">
                    <div class="config-panel-title">Layout & Compatibility</div>
                    <label class="config-toggle" for="aiostreamsMode">
                        <input type="checkbox" id="aiostreamsMode" name="aiostreamsMode">
                        <div>
                            <strong>AIOStreams Mode</strong>
                            <span>Formats stream titles and names to be compatible with AIOStreams custom formatting and regex parsing.</span>
                        </div>
                    </label>
                </div>

                <button id="settingsToggle" type="button" class="settings-btn">Settings: providers</button>
                <div id="settingsPanel" class="config-panel settings-panel">
                    <div class="config-panel-title">Providers</div>
                    <div class="provider-options">
                        {{providerSettingsHtml}}
                    </div>
                </div>

                <a id="installLink" href="#" class="install-btn">INSTALL ADDON</a>
                <button id="copyLink" type="button" class="copy-btn">📋 Copy Link</button>
            </div>
        </div>

        <div class="footer">
            Powered by <a href="https://github.com/realbestia1/" target="_blank">realbestia</a>
        </div>

        <script id="initialConfig" type="application/json">{{initialConfigJson}}</script>
        <script>
            // Dynamic Install Link
            const currentHost = window.location.host;
            const protocol = window.location.protocol;
            const installBtn = document.getElementById('installLink');
            const copyBtn = document.getElementById('copyLink');
            const easyCatalogsToggle = document.getElementById('easyCatalogsLangIt');
            const aiostreamsModeToggle = document.getElementById('aiostreamsMode');
            const easyProxyList = document.getElementById('easyProxyList');
            const addEasyProxyBtn = document.getElementById('addEasyProxy');
            const easyProxyModeInput = document.getElementById('easyProxyMode');
            const settingsToggle = document.getElementById('settingsToggle');
            const settingsPanel = document.getElementById('settingsPanel');
            const providerCheckboxes = Array.from(document.querySelectorAll('.provider-checkbox'));
            let manifestUrl = '';
            let stremioUrl = '';

            function readInitialConfig() {
                const node = document.getElementById('initialConfig');
                if (!node) return {};
                try {
                    return JSON.parse(node.textContent || '{}');
                } catch {
                    return {};
                }
            }

            const initialConfig = readInitialConfig();

            function createEasyProxyRow(values = {}) {
                const row = document.createElement('div');
                row.className = 'easy-proxy-row';
                row.innerHTML = `
                    <input class="config-input easy-proxy-url" type="url" placeholder="https://proxy.example.com" value="${String(values.url || '').replace(/"/g, '&quot;')}">
                    <input class="config-input easy-proxy-password" type="text" placeholder="api password (optional)" value="${String(values.password || '').replace(/"/g, '&quot;')}">
                    <button class="easy-proxy-remove" type="button" title="Remove EasyProxy">-</button>
                `;
                row.querySelectorAll('input').forEach((input) => {
                    input.addEventListener('input', updateInstallLinks);
                });
                row.querySelector('.easy-proxy-remove').addEventListener('click', () => {
                    row.remove();
                    if (easyProxyList && easyProxyList.children.length === 0) {
                        createEasyProxyRow();
                    }
                    updateInstallLinks();
                });
                easyProxyList.appendChild(row);
            }

            function getEasyProxyEntries() {
                if (!easyProxyList) return [];
                return Array.from(easyProxyList.querySelectorAll('.easy-proxy-row'))
                    .map((row) => {
                        let url = row.querySelector('.easy-proxy-url')?.value.trim() || '';
                        while (url.endsWith('/')) {
                            url = url.slice(0, -1);
                        }
                        const password = row.querySelector('.easy-proxy-password')?.value.trim() || '';
                        return { url, password };
                    })
                    .filter((entry) => entry.url);
            }

            function normalizeInitialEasyProxyEntries(config) {
                if (Array.isArray(config.easyProxies)) {
                    return config.easyProxies
                        .map((entry) => ({
                            url: String(entry?.url || '').trim(),
                            password: String(entry?.password || '').trim()
                        }))
                        .filter((entry) => entry.url);
                }

                const fallbackPassword = String(config.easyProxyPassword || '').trim();
                return String(config.easyProxyUrls || config.easyProxyUrl || '')
                    .split(/[\\s,]+/)
                    .map((url) => ({ url: url.trim(), password: fallbackPassword }))
                    .filter((entry) => entry.url);
            }

            function applyInitialConfig(config) {
                if (easyCatalogsToggle) {
                    easyCatalogsToggle.checked = ['1', 'true', 'yes', 'on', 'enabled', 'checked'].includes(String(config.easyCatalogsLangIt || '').toLowerCase())
                        || config.easyCatalogsLangIt === true;
                }

                if (aiostreamsModeToggle) {
                    aiostreamsModeToggle.checked = ['1', 'true', 'yes', 'on', 'enabled', 'checked'].includes(String(config.aiostreamsMode || '').toLowerCase())
                        || config.aiostreamsMode === true;
                }

                if (easyProxyModeInput && config.easyProxyMode) {
                    easyProxyModeInput.value = String(config.easyProxyMode);
                }

                const proxyEntries = normalizeInitialEasyProxyEntries(config);
                if (easyProxyList) {
                    easyProxyList.innerHTML = '';
                    if (proxyEntries.length > 0) {
                        proxyEntries.forEach((entry) => createEasyProxyRow(entry));
                    } else {
                        createEasyProxyRow();
                    }
                }

                const disabledProviderConfig = Object.prototype.hasOwnProperty.call(config || {}, 'disabledProviders')
                    ? config.disabledProviders
                    : '';
                const disabledProviders = new Set(String(disabledProviderConfig || '')
                    .split(',')
                    .map((name) => name.trim().toLowerCase())
                    .filter(Boolean));
                providerCheckboxes.forEach((input) => {
                    input.checked = !disabledProviders.has(String(input.value || '').toLowerCase());
                });
            }

            function getConfigPath() {
                const config = {};
                if (easyCatalogsToggle && easyCatalogsToggle.checked) {
                    config.easyCatalogsLangIt = 'on';
                }
                if (aiostreamsModeToggle && aiostreamsModeToggle.checked) {
                    config.aiostreamsMode = 'on';
                }
                const easyProxyEntries = getEasyProxyEntries();
                if (easyProxyEntries.length > 0) {
                    config.easyProxies = easyProxyEntries;
                }
                if (easyProxyModeInput && easyProxyModeInput.value && easyProxyModeInput.value !== 'failover') {
                    config.easyProxyMode = easyProxyModeInput.value;
                }
                const disabledProviders = providerCheckboxes
                    .filter((input) => !input.checked)
                    .map((input) => input.value);
                const disabledProvidersToken = disabledProviders.join(',');
                if (disabledProvidersToken !== '') {
                    config.disabledProviders = disabledProvidersToken;
                }
                if (Object.keys(config).length === 0) return '';
                const encodedConfig = encodeURIComponent(JSON.stringify(config));
                return `/${encodedConfig}`;
            }

            function updateInstallLinks() {
                const configPath = getConfigPath();
                manifestUrl = `${protocol}//${currentHost}${configPath}/manifest.json`;
                stremioUrl = `stremio://${currentHost}${configPath}/manifest.json`;
                installBtn.href = stremioUrl;
            }
            if (easyCatalogsToggle) {
                easyCatalogsToggle.addEventListener('change', updateInstallLinks);
            }
            if (aiostreamsModeToggle) {
                aiostreamsModeToggle.addEventListener('change', updateInstallLinks);
            }
            if (addEasyProxyBtn) {
                addEasyProxyBtn.addEventListener('click', () => {
                    createEasyProxyRow();
                    updateInstallLinks();
                });
            }
            if (easyProxyModeInput) {
                easyProxyModeInput.addEventListener('change', updateInstallLinks);
            }
            if (settingsToggle && settingsPanel) {
                settingsToggle.addEventListener('click', () => {
                    settingsPanel.classList.toggle('open');
                });
            }
            providerCheckboxes.forEach((input) => {
                input.addEventListener('change', updateInstallLinks);
            });
            applyInitialConfig(initialConfig);
            updateInstallLinks();
            // Copy Link Logic
            copyBtn.addEventListener('click', async () => {
                try {
                    const showCopySuccess = () => {
                        const originalText = copyBtn.innerText;
                        copyBtn.innerText = '? Copied!';
                        copyBtn.style.borderColor = '#4CAF50';
                        copyBtn.style.color = '#4CAF50';
                        
                        setTimeout(() => {
                            copyBtn.innerText = originalText;
                            copyBtn.style.borderColor = '';
                            copyBtn.style.color = '';
                        }, 2000);
                    };

                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(manifestUrl);
                    } else {
                        const textArea = document.createElement('textarea');
                        textArea.value = manifestUrl;
                        textArea.setAttribute('readonly', '');
                        textArea.style.position = 'fixed';
                        textArea.style.top = '-9999px';
                        textArea.style.left = '-9999px';
                        document.body.appendChild(textArea);
                        textArea.focus();
                        textArea.select();
                        const copied = document.execCommand('copy');
                        document.body.removeChild(textArea);
                        if (!copied) throw new Error('Fallback copy failed');
                    }

                    showCopySuccess();
                } catch (err) {
                    console.error('Failed to copy: ', err);
                }
            });
            
            console.log("Manifest URL:", manifestUrl);
        </script>
    </body>
    </html>
